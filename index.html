<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mission Résistance</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: url("https://images.unsplash.com/photo-1473445361085-b9a07f55608b") no-repeat center;
    background-size: cover;
    color: #f5e6c8;
}

.overlay {
    background: rgba(0,0,0,0.85);
    min-height: 100vh;
    padding: 20px;
    text-align: center;
}

h1 {
    font-size: 42px;
    letter-spacing: 4px;
}

.subtitle {
    margin-bottom: 20px;
    font-size: 18px;
    opacity: 0.8;
}

.card {
    background: #f5e6c8;
    color: black;
    padding: 25px;
    border-radius: 12px;
    max-width: 650px;
    margin: auto;
    box-shadow: 0 0 30px black;
}

button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border: none;
    background: #2e2e2e;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

button:hover {
    background: #555;
    transform: scale(1.02);
}

#progress {
    margin: 15px 0;
    letter-spacing: 5px;
}

#code {
    font-size: 30px;
    margin-top: 25px;
    letter-spacing: 10px;
}

.radio {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="overlay">
<h1>MISSION RÉSISTANCE</h1>
<div class="subtitle">Pontain-l'Écluse • 1940</div>

<div id="progress"></div>

<div class="card">
    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<div id="code"></div>

<div class="radio">📻 Radio Londres — écoutez attentivement…</div>

</div>

<!-- Sons -->
<audio id="bg" src="https://upload.wikimedia.org/wikipedia/commons/4/45/BBC_radio_tuning_signal.ogg" loop></audio>
<audio id="good" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="bad" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="type" src="https://www.soundjay.com/mechanical/sounds/typewriter-key-1.mp3"></audio>

<script>

// musique
document.body.addEventListener("click", () => {
    document.getElementById("bg").play();
}, { once: true });

const questions = [
{
q: "Durant quelle guerre se déroule l’histoire ?",
a: ["1914-1918", "1939-1945", "2000 - 2003"],
correct: 1, chiffre: 0
},
{
q: "Quel est le nom du réseau des enfants ?",
a: ["Le Lynx", "Les Robinsons", "Les Faucons"],
correct: 0, chiffre: 5
},
{
q: "Quelle est l’origine de Lisa ?",
a: ["Allemande", "Française", "Belge", "Alsacienne"],
correct: 0, chiffre: 6
},
{
q: "QUel est le sabotage fait par les enfants ?",
a: ["ils taguent les chars", "casse une canalisation sur le canal", "ils"],
correct: 1, chiffre: 0
},
{
q: " Quels sont les prénoms de enfants ?",
a: ["jules, paul et marion", "François, Eusèbe et Lisa", "Albert, georges et marie"],
correct: 1, chiffre: 0
},
{
q: "Quelle est la date de l’appel du général de Gaulle ?",
a: ["18 avril", "18 juin", "25 juin"],
correct: 1, chiffre: 6
}
];

let i = 0;
let code = "";

function typeEffect(text, element){
    let index = 0;
    element.innerHTML = "";
    let interval = setInterval(()=>{
        document.getElementById("type").play();
        element.innerHTML += text[index];
        index++;
        if(index >= text.length) clearInterval(interval);
    }, 20);
}

function loadQuestion() {
    let q = questions[i];

    document.getElementById("progress").innerText =
        "●".repeat(i) + "○".repeat(questions.length - i);

    typeEffect(q.q, document.getElementById("question"));

    let html = "";
    q.a.forEach((rep, index)=>{
        html += `<button onclick="answer(${index})">${rep}</button>`;
    });

    document.getElementById("answers").innerHTML = html;
}

function answer(index) {
    if(index === questions[i].correct){
        document.getElementById("good").play();
        code += questions[i].chiffre;
    } else {
        document.getElementById("bad").play();
        code += "X";
    }

    i++;

    if(i < questions.length){
        setTimeout(loadQuestion, 500);
    }
