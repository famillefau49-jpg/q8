<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mission Résistance</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: url("https://images.unsplash.com/photo-1504608524841-42fe6f032b4b") center/cover;
    color: #e6d3a3;
}

.overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.85);
    text-align: center;
    padding: 20px;
}

.title {
    font-size: 50px;
    letter-spacing: 6px;
}

.subtitle {
    opacity: 0.8;
    margin-bottom: 30px;
}

.card {
    background: #f2e2b8;
    color: #111;
    width: 600px;
    max-width: 90%;
    margin: auto;
    padding: 25px;
    border-radius: 8px;
    border: 3px solid #3a2e1f;
    box-shadow: 0 0 40px black;
}

.answer {
    background: #d2b98a;
    margin: 10px 0;
    padding: 15px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid #8b7a4f;
    transition: 0.2s;
}

.answer:hover {
    background: #c4a76f;
}

.progress {
    margin-top: 20px;
}

.dot {
    width: 12px;
    height: 12px;
    background: #444;
    border-radius: 50%;
    display: inline-block;
    margin: 5px;
}

.active {
    background: #e6d3a3;
}

#code {
    margin-top: 30px;
    font-size: 28px;
    letter-spacing: 10px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="title">MISSION RÉSISTANCE</div>
<div class="subtitle">Pontain-l'Écluse • 1940</div>

<div class="card">
    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<div class="progress" id="progress"></div>
<div id="code"></div>

</div>

<!-- Sons -->
<audio id="bg" src="https://upload.wikimedia.org/wikipedia/commons/4/45/BBC_radio_tuning_signal.ogg" loop></audio>
<audio id="good" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="bad" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

// ambiance sonore (radio guerre)
document.body.addEventListener("click", () => {
    let bg = document.getElementById("bg");
    bg.volume = 0.25;
    bg.play().catch(()=>{});
}, { once: true });

const questions = [
{
q: "Durant quelle guerre se déroule l’histoire ?",
a: ["1914-1918", "1939-1945", "2000 - 2003"],
correct: 1, chiffre: 0
},
{
q: "Quel est le nom du réseau des enfants ?",
a: ["Le Lynx", "Les Robinsons", "Les Faucons"],
correct: 0, chiffre: 5
},
{
q: "Quelle est l’origine de Lisa ?",
a: ["Allemande", "Française", "Belge", "Alsacienne"],
correct: 0, chiffre: 6
},
{
q: "Quel est le sabotage fait par les enfants ?",
a: ["Ils taguent les chars", "Ils cassent une canalisation du canal", "Ils fuient"],
correct: 1, chiffre: 0
},
{
q: "Quels sont les prénoms des enfants ?",
a: ["Jules, Paul et Marion", "François, Eusèbe et Lisa", "Albert, Georges et Marie"],
correct: 1, chiffre: 0
},
{
q: "Quelle est la date de l’appel du général de Gaulle ?",
a: ["18 avril", "18 juin", "25 juin"],
correct: 1, chiffre: 6
}
];

let i = 0;
let code = "";

function updateProgress(){
    let html = "";
    for(let j=0;j<questions.length;j++){
        html += `<span class="dot ${j < i ? 'active' : ''}"></span>`;
    }
    document.getElementById("progress").innerHTML = html;
}

function loadQuestion(){
    let q = questions[i];
    document.getElementById("question").innerText = q.q;

    let html = "";
    q.a.forEach((rep, index)=>{
        html += `<div class="answer" onclick="answer(${index}, this)">${rep}</div>`;
    });

    document.getElementById("answers").innerHTML = html;
    updateProgress();
}

function answer(index, el){

    let all = document.querySelectorAll(".answer");
    all.forEach(a => a.style.pointerEvents = "none");

    if(index === questions[i].correct){
        good.play();
        el.style.background = "#3e5f3e";
        code += questions[i].chiffre;
    } else {
        bad.play();
        el.style.background = "#7a2c2c";
        code += "✖";
    }

    i++;

    setTimeout(()=>{
        if(i < questions.length){
            loadQuestion();
        } else {

            document.getElementById("question").innerText = "Mission terminée";
            document.getElementById("answers").innerHTML = "";

            document.getElementById("code").innerText = "🔐 CODE : " + code;

            if(code.includes("✖")){
                document.getElementById("code").innerHTML += "<br>❌ Recommence la mission";
            } else {
                document.getElementById("code").innerHTML += "<br>✅ Code validé";
                confetti({ particleCount: 150, spread: 70 });
            }

            document.getElementById("answers").innerHTML =
            '<button onclick="restart()">🔁 Recommencer</button>';
        }
    },600);
}

function restart(){
    i = 0;
    code = "";
    document.getElementById("code").innerText = "";
    loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
