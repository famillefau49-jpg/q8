<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mission Résistance</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: #e6d3a3;
    text-align: center;
}

.card {
    background: #f2e2b8;
    color: black;
    max-width: 600px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 10px;
}

.answer {
    background: #333;
    color: white;
    padding: 18px;
    margin: 10px 0;
    cursor: pointer;
    font-size: 22px;
}

.answer:hover {
    background: #555;
}

#code {
    margin-top: 30px;
    font-size: 30px;
}
</style>
</head>

<body>

<h1>MISSION RÉSISTANCE</h1>

<div class="card">
    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<div id="code"></div>

<!-- sons intégrés (fiables) -->
<audio id="good" src="data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="></audio>
<audio id="bad" src="data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="></audio>

<script>

const questions = [
{ q:"Guerre ?", a:["14-18","39-45"], correct:1, chiffre:0 },
{ q:"Réseau ?", a:["Lynx","Robinsons"], correct:0, chiffre:5 },
{ q:"Lisa ?", a:["Allemande","Alsacienne"], correct:0, chiffre:6 },
{ q:"Sabotage ?", a:["Canal","Fuite"], correct:0, chiffre:0 },
{ q:"Enfants ?", a:["François Eusèbe Lisa","Autres"], correct:0, chiffre:0 },
{ q:"Date appel ?", a:["18 juin","25 juin"], correct:0, chiffre:6 }
];

let i = 0;
let code = "";

// 🔥 débloque audio (important)
document.addEventListener("click", () => {
    document.getElementById("good").play().then(a=>a.pause());
    document.getElementById("bad").play().then(a=>a.pause());
}, { once:true });

function loadQuestion(){
    let q = questions[i];
    document.getElementById("question").innerText = q.q;

    let html="";
    q.a.forEach((rep, idx)=>{
        html += `<div class="answer" onclick="answer(${idx}, this)">${rep}</div>`;
    });

    document.getElementById("answers").innerHTML = html;
}

function answer(idx, el){

    let all = document.querySelectorAll(".answer");
    all.forEach(a=>a.style.pointerEvents="none");

    if(idx === questions[i].correct){
        document.getElementById("good").currentTime=0;
        document.getElementById("good").play();
        el.style.background="green";
        code += questions[i].chiffre;
    } else {
        document.getElementById("bad").currentTime=0;
        document.getElementById("bad").play();
        el.style.background="red";
        code += "✖";
    }

    i++;

    setTimeout(()=>{
        if(i<questions.length){
            loadQuestion();
        } else {
            document.getElementById("question").innerText="FIN";
            document.getElementById("answers").innerHTML="";
            document.getElementById("code").innerText="CODE : "+code;
        }
    },500);
}

loadQuestion();

</script>

</body>
</html>
